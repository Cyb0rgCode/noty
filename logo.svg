<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="c">
      <text x="256" y="440"
            font-family="'Arial Black','Arial',Helvetica,sans-serif"
            font-weight="900" font-size="460" text-anchor="middle">N</text>
    </clipPath>
  </defs>

  <!-- Black background -->
  <rect width="512" height="512" fill="#0d0d0d"/>

  <!-- Base medium violet -->
  <rect width="512" height="512" fill="#6b40d0" clip-path="url(#c)"/>

  <!-- Light face: upper-left (dominant lavender, mirrors the rock's main face) -->
  <polygon points="0,0 430,0 110,512 0,512"
           fill="#b79bff" opacity="0.55" clip-path="url(#c)"/>

  <!-- Shadow face: lower-right (deep indigo) -->
  <polygon points="430,0 512,0 512,512 110,512"
           fill="#1a0860" opacity="0.65" clip-path="url(#c)"/>

  <!-- Highlight edge at face boundary (crystal ridge) -->
  <polygon points="405,0 450,0 130,512 85,512"
           fill="rgba(230,210,255,0.4)" clip-path="url(#c)"/>

  <!-- Subtle top sheen -->
  <rect x="0" y="0" width="512" height="55"
        fill="rgba(220,200,255,0.12)" clip-path="url(#c)"/>

  <!-- Depth shadow at very bottom -->
  <rect x="0" y="450" width="512" height="62"
        fill="rgba(0,0,20,0.3)" clip-path="url(#c)"/>
</svg>
