<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Noty">
  <meta name="theme-color" content="#0d0d0d">
  <meta name="color-scheme" content="dark light">
  <link rel="apple-touch-icon" href="icon-dark-180.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-dark-180.png">
  <link rel="apple-touch-icon" sizes="167x167" href="icon-dark-167.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icon-dark-152.png">
  <link rel="apple-touch-icon" sizes="120x120" href="icon-dark-120.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png"      media="(prefers-color-scheme: light)">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-dark-512.png" media="(prefers-color-scheme: dark)">
  <title>Noty — Smart Learning</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="ob-topbar">
    <button class="ob-icon-btn" id="ob-menu-btn" aria-label="Open menu">&#9776;</button>
    <div class="ob-title" id="ob-title">Dashboard</div>
    <button class="ob-icon-btn" id="ob-action-btn" aria-label="New note">+</button>
  </header>

  <div id="app">
    <div id="ob-scrim"></div>
    <nav id="sidebar">
      <div class="ob-ribbon">
        <button class="ob-ribbon-btn" id="rb-new" title="New note" aria-label="New note">+</button>
        <button class="ob-ribbon-btn" id="rb-search" title="Search notes" aria-label="Search notes">&#128269;</button>
        <div class="ob-ribbon-spacer"></div>
        <button class="ob-ribbon-btn" data-view="settings" title="Settings" aria-label="Settings">&#9881;</button>
      </div>
      <div class="ob-drawer-main">
        <div class="sidebar-header">
          <div class="logo">
            <img class="logo-icon" id="logo-img" src="icon-dark-120.png" alt="Noty">
            <span class="logo-text">Noty</span>
          </div>
        </div>
        <ul class="nav-links">
          <li class="nav-item active" data-view="dashboard">
            <span class="nav-icon">&#9783;</span>
            <span>Dashboard</span>
          </li>
          <li class="nav-item" data-view="notes">
            <span class="nav-icon">&#9998;</span>
            <span>Notes</span>
          </li>
          <li class="nav-item" data-view="flashcards">
            <span class="nav-icon">&#9889;</span>
            <span>Flashcards</span>
          </li>
          <li class="nav-item" data-view="quiz">
            <span class="nav-icon">&#10067;</span>
            <span>Quiz</span>
          </li>
          <li class="nav-item" data-view="mindmap">
            <span class="nav-icon">&#9711;</span>
            <span>Mind Map</span>
          </li>
          <li class="nav-item" data-view="settings">
            <span class="nav-icon">&#9881;</span>
            <span>Settings</span>
          </li>
        </ul>
        <div class="sidebar-footer" id="sidebar-stats"></div>
      </div>
    </nav>
    <main id="main-content"></main>
  </div>

  <div id="toast" class="toast hidden"></div>
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal" class="modal"></div>
  </div>

  <script>
    // Theme init — runs before the module loads to avoid flash.
    // Theme setting: 'dark' (default) | 'light' | 'system'.
    (function() {
      const mq = window.matchMedia('(prefers-color-scheme: dark)');

      function stored() {
        try { return JSON.parse(localStorage.getItem('noty_settings') || '{}').theme || 'dark'; }
        catch { return 'dark'; }
      }

      window.__applyTheme = function(pref) {
        const resolved = pref === 'system' ? (mq.matches ? 'dark' : 'light') : pref;
        document.documentElement.dataset.theme = resolved;
        const img = document.getElementById('logo-img');
        if (img) img.src = resolved === 'dark' ? 'icon-dark-120.png' : 'icon-120.png';
        const meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.content = resolved === 'dark' ? '#0d0d0d' : '#f5f5f5';
      };

      window.__applyTheme(stored());
      mq.addEventListener('change', () => {
        if (stored() === 'system') window.__applyTheme('system');
      });
    })();
  </script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
