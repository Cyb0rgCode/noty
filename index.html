<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Noty">
  <meta name="theme-color" content="#0d0d1a">
  <title>Noty — Smart Learning</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <nav id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-icon">N</div>
          <span class="logo-text">Noty</span>
        </div>
      </div>
      <ul class="nav-links">
        <li class="nav-item active" data-view="dashboard">
          <span class="nav-icon">&#9783;</span>
          <span>Dashboard</span>
        </li>
        <li class="nav-item" data-view="notes">
          <span class="nav-icon">&#9998;</span>
          <span>Notes</span>
        </li>
        <li class="nav-item" data-view="flashcards">
          <span class="nav-icon">&#9889;</span>
          <span>Flashcards</span>
        </li>
        <li class="nav-item" data-view="quiz">
          <span class="nav-icon">&#10067;</span>
          <span>Quiz</span>
        </li>
        <li class="nav-item" data-view="mindmap">
          <span class="nav-icon">&#9711;</span>
          <span>Mind Map</span>
        </li>
        <li class="nav-item" data-view="settings">
          <span class="nav-icon">&#9881;</span>
          <span>Settings</span>
        </li>
      </ul>
      <div class="sidebar-footer" id="sidebar-stats"></div>
    </nav>
    <main id="main-content"></main>
  </div>

  <div id="toast" class="toast hidden"></div>
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal" class="modal"></div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
